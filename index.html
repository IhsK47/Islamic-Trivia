<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Trivia! - by Barrie K</title>
    <link rel="stylesheet" href="style.css">
    <script></script>

</head>

<body>

    <header>
        <h1>Barries Quiz</h1>


        <a href="./index.html">
            <img src="refresh icon.png" alt="refresh button" class="btn refreshBtn" id="">
        </a>

        <div class="timer">t</div>

        <h3>0/0</h3>

    </header>

    <div id="q-section">
        <h2 class="question">Select Difficulty</h2> <!-- where question or select difficulty displayed -->
    </div>


    <div class="grids">

        <div class="difficultyGrid">
            <button class="btn difficultyBtn">Islam (Easy)</button>
            <button class="btn difficultyBtn">Imaan (Medium)</button>
            <button class="btn difficultyBtn">Ihsan (Boss)</button>

        </div>

        <div class="optionsGrid">
            <button class="btn option">a</button>
            <button class="btn option">b</button>
            <button class="btn option">c</button>
            <button class="btn option">d</button>
        </div>


    </div>

</body>

<script src="./script.js" type="module"></script>
<!-- type=module allows imports -->
<!-- there is some extra stuff to say in order to be able to keep script tag in head -->

</html>
